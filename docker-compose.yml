# AcademiaOS -- Docker Compose configuration
# Usage: docker compose up --build

services:
  academia-os:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./vaults:/app/vaults
      - ./files:/app/files
      - ./progress:/app/progress
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
